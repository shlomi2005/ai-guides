<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסת מנהל — מדריכי AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #e8dccb; --card: #f5efe4; --border: rgba(120,90,50,0.15); --border2: rgba(120,90,50,0.28);
  --acc: #7c5c2e; --acc-h: #9a7340;
  --t1: #1c140a; --t2: #6b5740; --t3: #a09078;
}
html, body { background: var(--bg); color: var(--t1);
  font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 42px 38px; width: 360px;
  box-shadow: 0 2px 6px rgba(80,50,20,0.10), 0 12px 40px rgba(80,50,20,0.12);
}
.logo-wrap { text-align: center; margin-bottom: 30px; }
.logo-mark {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, var(--acc), var(--acc-h));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin-bottom: 13px;
  box-shadow: 0 2px 8px rgba(124,92,46,0.3);
}
.logo-text { font-size: 1.0625rem; font-weight: 700; color: var(--t1); display: block; letter-spacing: -0.01em; }
.logo-sub { font-size: 0.8125rem; color: var(--t3); margin-top: 3px; }
label { display: block; font-size: 0.6875rem; font-weight: 700; color: var(--t3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
input {
  width: 100%; background: rgba(255,255,255,0.65); border: 1px solid var(--border);
  border-radius: 9px; padding: 11px 14px; color: var(--t1);
  font-size: 0.875rem; font-family: inherit; outline: none;
  transition: border-color 150ms, box-shadow 150ms; margin-bottom: 18px;
}
input:focus { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(124,92,46,0.12); background: #fff; }
input::placeholder { color: var(--t3); }
button {
  width: 100%; background: var(--acc); border: none; border-radius: 9px;
  padding: 12px; color: #f5efe4; font-size: 0.9375rem; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: background 150ms, transform 150ms;
  letter-spacing: 0.01em;
}
button:hover { background: var(--acc-h); }
button:active { transform: scale(0.98); }
.error {
  background: rgba(180,60,40,0.08); border: 1px solid rgba(180,60,40,0.2);
  border-radius: 9px; padding: 11px 14px; color: #b03a2a;
  font-size: 0.8125rem; margin-bottom: 18px;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo-wrap">
    <div class="logo-mark">🤖</div>
    <span class="logo-text">מדריכי AI</span>
    <div class="logo-sub">כניסת מנהל מערכת</div>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>שם משתמש</label>
    <input name="username" type="text" autocomplete="username" autofocus required placeholder="הזן שם משתמש">
    <label>סיסמה</label>
    <input name="password" type="password" autocomplete="current-password" required placeholder="הזן סיסמה">
    <button type="submit">כניסה</button>
  </form>
</div>
</body>
</html>
