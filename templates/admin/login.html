<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסת אדמין</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #f0f0f0; font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; width: 360px; }
.logo { font-size: 1.4rem; font-weight: 800; color: #6c63ff; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 32px; }
label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 6px; }
input {
  width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
  padding: 12px 14px; color: #f0f0f0; font-size: 0.95rem; margin-bottom: 20px;
  outline: none; transition: .2s;
}
input:focus { border-color: #6c63ff; }
button {
  width: 100%; background: #6c63ff; border: none; border-radius: 8px;
  padding: 13px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: .2s;
}
button:hover { background: #8b85ff; }
.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 8px;
  padding: 10px 14px; color: #f87171; font-size: 0.85rem; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">🤖 מדריכי AI</div>
  <div class="subtitle">כניסת מנהל מערכת</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>שם משתמש</label>
    <input name="username" type="text" autocomplete="username" autofocus required>
    <label>סיסמה</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button type="submit">כניסה</button>
  </form>
</div>
</body>
</html>
